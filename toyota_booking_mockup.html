<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEB入庫予約</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        toyota: { red: '#EB0A1E', black: '#000000', gray: '#F5F5F5', border: '#E5E7EB', text: '#333333' },
                        login: { header: '#737373', bg: '#ffffff', graybg: '#F5F5F5' }
                    },
                    fontSize: { 'xxs': '0.65rem' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background-color: #E2E8F0; color: #333333; margin: 0; }
        
        .app-container { max-width: 800px; margin: 0 auto; background-color: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); display: flex; flex-direction: column; overflow: hidden; }
        .app-content { flex: 1; overflow-y: auto; overflow-x: hidden; position: relative; scroll-behavior: smooth; background-color: #ffffff; }
        
        .header { position: sticky; top: 0; background: white; z-index: 50; border-bottom: 1px solid #E5E7EB; }
        .sticky-footer { position: sticky; bottom: 0; background: white; padding: 16px; border-top: 1px solid #E5E7EB; z-index: 40; width: 100%; box-shadow: 0 -4px 10px rgba(0,0,0,0.03); }
        
        .fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-checkbox { appearance: none; background-color: #fff; margin: 0; width: 20px; height: 20px; border: 1px solid #ccc; border-radius: 2px; display: grid; place-content: center; cursor: pointer; }
        .custom-checkbox::before { content: ""; width: 10px; height: 10px; transform: scale(0); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; background-color: white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        .custom-checkbox:checked { background-color: #EB0A1E; border-color: #EB0A1E; }
        .custom-checkbox:checked::before { transform: scale(1); }
        
        .login-checkbox { appearance: none; background-color: #EB0A1E; margin: 0; width: 24px; height: 24px; border: none; border-radius: 50%; display: grid; place-content: center; cursor: pointer; flex-shrink: 0; }
        .login-checkbox::before { content: ""; width: 12px; height: 12px; transform: scale(1); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; background-color: white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        
        .custom-radio { appearance: none; background-color: #fff; margin: 0; width: 20px; height: 20px; border: 1px solid #ccc; border-radius: 50%; display: grid; place-content: center; cursor: pointer; pointer-events: none; }
        .custom-radio::before { content: ""; width: 10px; height: 10px; border-radius: 50%; transform: scale(0); transition: 120ms transform ease-in-out; background-color: #EB0A1E; }
        .custom-radio:checked { border-color: #EB0A1E; }
        .custom-radio:checked::before { transform: scale(1); }
        
        .stepper-circle { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #E5E7EB; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; position: relative;}
        .calendar-cell { height: 48px; border-bottom: 1px solid #f0f0f0; vertical-align: top; padding-top: 4px; }
        .calendar-cell.selectable { cursor: pointer; }
        .calendar-cell.selectable:active { background-color: #fce7e8; }
        .calendar-cell.selected { border: 2px solid #EB0A1E; border-radius: 4px; background-color: #fce7e8; }
        
        .modal-overlay { position: fixed; inset: 0; background-color: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
        .bottom-sheet { transform: translateY(100%); transition: transform 0.3s ease-out; background: white; border-top-left-radius: 1rem; border-top-right-radius: 1rem; height: 90%; display: flex; flex-direction: column; width: 100%; max-width: 480px; margin: 0 auto; overflow: hidden; }
        .bottom-sheet.open { transform: translateY(0); }
        
        .full-modal { position: fixed; inset: 0; background: white; z-index: 300; display: flex; flex-direction: column; transform: translateY(100%); transition: transform 0.3s ease-out; width: 100%; max-width: 800px; margin: 0 auto; }
        .full-modal.open { transform: translateY(0); }
        
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        
        /* デバッグパネル */
        .debug-panel { display: none; background: #fff; border-bottom: 2px solid #ccc; padding: 15px; font-size: 12px; max-height: 80vh; overflow-y: auto; }
        .debug-panel.active { display: block; }
    </style>
</head>
<body>

    <!-- デバッグ用・マスタ設定パネル（最前面・最上部に配置） -->
    <div class="app-container" style="min-height: auto; box-shadow: none; background: transparent; z-index: 9999;">
        <button id="btn-toggle-debug" class="w-full bg-gray-800 text-white text-xs py-2 opacity-50 hover:opacity-100 transition-opacity">🛠 デバッグ・シーン切替＆マスタ設定</button>
        <div id="debugPanel" class="debug-panel">
            <h3 class="font-bold border-b pb-1 mb-3">1. シーン切替</h3>
            <div class="grid grid-cols-4 gap-2 mb-6">
                <button class="js-action border p-2 rounded hover:bg-gray-50" data-action="scenario" data-val="login">🔑 ログイン</button>
                <button class="js-action border p-2 rounded hover:bg-gray-50" data-action="scenario" data-val="default">🚗 初期TOP</button>
                <button class="js-action border p-2 rounded hover:bg-gray-50" data-action="scenario" data-val="one_car">🚙 1台リク中</button>
                <button class="js-action border p-2 rounded hover:bg-gray-50" data-action="scenario" data-val="confirmed">✅ 予約確定</button>
            </div>

            <h3 class="font-bold border-b pb-1 mb-3">2. マスタ設定（店舗）</h3>
            <div id="master-stores-container" class="mb-4 space-y-2"></div>
            <button class="js-action w-full border border-black bg-gray-50 py-1 rounded text-xs mb-6" data-action="master-add-store">＋ 店舗を追加</button>

            <h3 class="font-bold border-b pb-1 mb-3">3. マスタ設定（入庫種別）</h3>
            <div id="master-services-container" class="mb-4 space-y-2"></div>
            <button class="js-action w-full border border-black bg-gray-50 py-1 rounded text-xs" data-action="master-add-service">＋ 種別を追加</button>
        </div>
    </div>

    <!-- アプリ本体 -->
    <div class="app-container flex flex-col h-[100vh]" id="app-root">
        <div class="app-content flex flex-col" id="app"></div>
    </div>

    <script>
        // =========================================================
        // 1. データとステート管理
        // =========================================================
        const MOCK_DATA = {
            stores: {
                favorites: [ { id: 's1', name: '千代田店', company: 'トヨタモビリティ東京', address: '東京都千代田区...', tel: '03-3335-2521', hours: '10:00 - 18:00', holiday: '火曜、第1・第3月曜', img: 'https://images.unsplash.com/photo-1542362567-b07e54358753?w=400&q=80' } ],
                others: { 'トヨタモビリティ東京': [ { id: 's3', name: '高井戸北陸橋店', label: '常用店舗', img: 'https://images.unsplash.com/photo-1542362567-b07e54358753?w=100' }, { id: 's4', name: '井荻店', img: 'https://images.unsplash.com/photo-1551522435-a13afa10f103?w=100' } ] }
            },
            vehicles: [
                { id: 'v1', name: 'クラウン', type: 'CROSSOVER RS', plate: '名古屋 000 か 1234', chassis: '123-123456', expire: '2026年12月10日', recommendedDate: '2026年9月22日', img: 'https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?w=400&q=80' }
            ],
            services: [
                { id: 'srv1', name: '12ヶ月定期点検', time: '1時間〜', desc: 'メンテナンス詳細文章が入ります。' }
            ],
            faq: [
                { q: 'WEB入庫予約サービスとはどのようなサービスですか？', a: 'WEB入庫予約サービスは、車両の点検・整備に関する入庫予約を、より便利かつ円滑に行っていただくためのサービスです。LINEと連携することで、お客さまと販売店のコミュニケーションをスムーズにし、24時間365日、ご都合に合わせて入庫予約リクエストが可能です。' },
                { q: 'サービスを利用するには、何が必要ですか？', a: '本サービスをご利用いただくには、以下の条件を満たしている必要があります。\n・LINE WORKSまたはトヨトークを導入している販売店と、LINEで友だち登録をしていること\n・個人のTOYOTAアカウントをお持ちで、ログインできること\n・対象販売店とTOYOTAアカウントの「販売店登録」が完了していること\n・WEB入庫予約サービスの利用規約に同意していること' },
                { q: 'どのように入庫予約をすればよいですか？', a: '販売店スタッフから届くLINEメッセージ、またはLINEのリッチメニューからWEB入庫予約サイトへアクセスし、希望する「販売店・店舗」「対象車両」「入庫種別」を選択します。\nその後、予約可能な枠を確認しながら、第一希望から第三希望までの入庫希望日時を選択し、予約リクエストを送信してください。' },
                { q: '予約はすぐに確定しますか？', a: '本サービスは「予約リクエスト型」を採用しているため、リクエスト送信時点では予約は確定しません。お客さまからのリクエスト内容を販売店が確認し、予約可能枠を確保したうえで入庫予約を確定します。予約が確定すると、LINEにてお知らせします。' },
                { q: 'LINEはどのように活用されますか？', a: 'LINEは、販売店との1対1のコミュニケーションおよび各種通知の手段として活用されます。入庫のご案内、予約確定の通知、来店リマインド、来店後のお礼メッセージなどがLINEで届き、入庫予約から来店後までをサポートします。' },
                { q: '複数台の車両を同時に予約できますか？', a: '現時点では、WEB入庫予約サイトから1回の予約で選択できる車両は1台のみです。複数台をご希望の場合は、車両ごとに予約を行ってください。' },
                { q: '1台の車両で複数の入庫種別を予約できますか？', a: '現時点では、WEB入庫予約サイトからは1台の車両に対して1つの入庫種別の予約のみが可能です。複数の入庫種別の予約をご希望の場合は、予約リクエスト時のフリーコメント欄にご記載いただくか、LINEまたはお電話にて販売店へご相談ください。' },
                { q: '予約をキャンセルしたい場合はどうすればよいですか？', a: 'WEB入庫予約サイトよりキャンセル手続きが可能です。サイト上で予約内容を確認のうえ、キャンセル操作を行うことで手続きが完了します。' },
                { q: 'サービスについて不明な点がある場合、どこに問い合わせればよいですか？', a: 'サービス内容やご利用方法についてご不明な点がある場合は、ご利用の販売店までお問い合わせください。' }
            ],
            // 動的画像のプレースホルダー
            pointImg1: 'https://placehold.co/400x250/f9f9f9/cccccc?text=Illustration+1',
            pointImg2: 'https://placehold.co/400x250/f9f9f9/cccccc?text=Illustration+2',
            pointImg3: 'https://placehold.co/400x250/f9f9f9/cccccc?text=Illustration+3',
            stepImg0: 'https://placehold.co/400x250/ffffff/cccccc?text=Step+0',
            stepImg1: 'https://placehold.co/400x250/ffffff/cccccc?text=Step+1',
            stepImg2: 'https://placehold.co/400x250/ffffff/cccccc?text=Step+2',
            stepImg3: 'https://placehold.co/400x250/ffffff/cccccc?text=Step+3',
            stepImg4: 'https://placehold.co/400x250/ffffff/cccccc?text=Step+4'
        };

        const state = {
            view: 'login', 
            agreedToTerms: false,
            reservations: [], 
            draft: { store: null, vehicle: null, service: null, date1: null, date2: null, date3: null, comment: '' },
            calendar: { currentYear: 2026, currentMonth: 9, selectedDateObj: null, targetSlot: 1 },
            ui: { termsModalOpen: false, dateModalOpen: false, dateModalStep: 'date' }
        };

        // 画像の動的読み込み
        async function initImages() {
            if (window.MetaOS && window.MetaOS.fs) {
                try {
                    const c = await window.MetaOS.fs.read('temp/media/1784012676920_image.png', { encoding: 'dataurl' });
                    if(c) MOCK_DATA.vehicles[0].img = c;
                    
                    const s = await window.MetaOS.fs.read('temp/media/1784012718713_image.png', { encoding: 'dataurl' });
                    if(s) { MOCK_DATA.stores.favorites.forEach(x => x.img = s); MOCK_DATA.stores.others['トヨタモビリティ東京'].forEach(x => x.img = s); }
                    
                    const p1 = await window.MetaOS.fs.read('temp/media/1784013557321_image.png', { encoding: 'dataurl' }); if(p1) MOCK_DATA.pointImg1 = p1;
                    
                    try {
                        const p2_new = await window.MetaOS.fs.read('temp/media/1784013930380_image.png', { encoding: 'dataurl' });
                        if(p2_new) MOCK_DATA.pointImg2 = p2_new;
                    } catch(e) {
                        const p2 = await window.MetaOS.fs.read('temp/media/1784013581441_image.png', { encoding: 'dataurl' }); if(p2) MOCK_DATA.pointImg2 = p2;
                    }

                    const p3 = await window.MetaOS.fs.read('temp/media/1784013606388_image.png', { encoding: 'dataurl' }); if(p3) MOCK_DATA.pointImg3 = p3;
                    
                    const st0 = await window.MetaOS.fs.read('temp/media/1784013636546_image.png', { encoding: 'dataurl' }); if(st0) MOCK_DATA.stepImg0 = st0;
                    const st1 = await window.MetaOS.fs.read('temp/media/1784013661294_image.png', { encoding: 'dataurl' }); if(st1) MOCK_DATA.stepImg1 = st1;
                    const st2 = await window.MetaOS.fs.read('temp/media/1784013702517_image.png', { encoding: 'dataurl' }); if(st2) MOCK_DATA.stepImg2 = st2;
                    const st3 = await window.MetaOS.fs.read('temp/media/1784013731567_image.png', { encoding: 'dataurl' }); if(st3) MOCK_DATA.stepImg3 = st3;
                    const st4 = await window.MetaOS.fs.read('temp/media/1784013759016_image.png', { encoding: 'dataurl' }); if(st4) MOCK_DATA.stepImg4 = st4;
                    
                    renderMasterPanel();
                    render();
                } catch(e) { console.error("画像差し替えエラー", e); renderMasterPanel(); render(); }
            } else { renderMasterPanel(); render(); }
        }

        // =========================================================
        // 2. イベント・デリゲーション (堅牢なバックエンド整理)
        // =========================================================
        document.body.addEventListener('click', (e) => {
            const target = e.target.closest('.js-action');
            if (!target) return;

            const action = target.getAttribute('data-action');
            const val = target.getAttribute('data-val');

            switch(action) {
                case 'navigate': 
                    navigate(val); 
                    break;
                case 'start-reserve':
                    state.draft = { store: null, vehicle: null, service: null, date1: null, date2: null, date3: null, comment: '' };
                    navigate('store');
                    break;
                case 'cancel-reservation':
                    if(confirm('この予約をキャンセルしますか？')) {
                        state.reservations = state.reservations.filter(r => r.id !== val);
                        render();
                    }
                    break;
                case 'select-store':
                    const store = MOCK_DATA.stores.favorites.find(x => x.id === val);
                    if(store) { state.draft.store = store; navigate('vehicle'); }
                    break;
                case 'select-vehicle':
                    const vehicle = MOCK_DATA.vehicles.find(x => x.id === val);
                    if(vehicle) { state.draft.vehicle = vehicle; render(); }
                    break;
                case 'select-service':
                    const srv = MOCK_DATA.services.find(x => x.id === val);
                    if(srv) { state.draft.service = srv; navigate('date'); }
                    break;
                case 'submit-request':
                    state.reservations.unshift({
                        id: 'REQ' + Date.now(), status: 'requesting', 
                        store: state.draft.store, vehicle: state.draft.vehicle, service: state.draft.service, 
                        date1: state.draft.date1, date2: state.draft.date2, date3: state.draft.date3, comment: state.draft.comment
                    });
                    navigate('complete');
                    break;
                case 'toggle-terms':
                    state.ui.termsModalOpen = val === 'open';
                    render();
                    break;
                    
                // --- カレンダー＆日時選択モーダル ---
                case 'open-date-modal':
                    state.calendar.targetSlot = parseInt(val, 10);
                    state.ui.dateModalStep = 'date';
                    state.calendar.selectedDateObj = null;
                    state.ui.dateModalOpen = true;
                    render();
                    setTimeout(() => { const sheet = document.getElementById('date-modal-sheet'); if(sheet) sheet.classList.add('open'); }, 10);
                    break;
                case 'close-date-modal':
                    const sheet = document.getElementById('date-modal-sheet');
                    if(sheet) sheet.classList.remove('open');
                    setTimeout(() => { state.ui.dateModalOpen = false; render(); }, 300);
                    break;
                case 'change-month':
                    const delta = parseInt(val, 10);
                    state.calendar.currentMonth += delta;
                    if(state.calendar.currentMonth > 12) { state.calendar.currentMonth = 1; state.calendar.currentYear++; }
                    if(state.calendar.currentMonth < 1) { state.calendar.currentMonth = 12; state.calendar.currentYear--; }
                    render();
                    break;
                case 'select-date-only':
                    const day = parseInt(val, 10);
                    const dow = ['日', '月', '火', '水', '木', '金', '土'][new Date(state.calendar.currentYear, state.calendar.currentMonth - 1, day).getDay()];
                    state.calendar.selectedDateObj = { 
                        year: state.calendar.currentYear, month: state.calendar.currentMonth, day: day, 
                        dateStr: `${state.calendar.currentMonth}月${day}日 (${dow})` 
                    };
                    state.ui.dateModalStep = 'time';
                    render();
                    break;
                case 'back-to-calendar':
                    state.ui.dateModalStep = 'date';
                    render();
                    break;
                case 'select-time-final':
                    const timeStr = val;
                    const dateData = { date: state.calendar.selectedDateObj.dateStr, time: timeStr }; 
                    if(state.calendar.targetSlot === 1) { state.draft.date1 = dateData; } 
                    else if(state.calendar.targetSlot === 2) { state.draft.date2 = dateData; } 
                    else if(state.calendar.targetSlot === 3) { state.draft.date3 = dateData; } 
                    
                    const sheetFinal = document.getElementById('date-modal-sheet');
                    if(sheetFinal) sheetFinal.classList.remove('open');
                    setTimeout(() => { state.ui.dateModalOpen = false; render(); }, 300);
                    break;

                // --- マスタ設定用 ---
                case 'master-add-store':
                    const newId = 's' + Date.now();
                    MOCK_DATA.stores.favorites.push({ id: newId, name: '新規店舗', company: 'トヨタモビリティ東京', address: '東京都...', tel: '00-0000-0000', hours: '10:00 - 18:00', holiday: '火曜', img: MOCK_DATA.stores.favorites[0].img });
                    renderMasterPanel(); render();
                    break;
                case 'master-add-service':
                    const newSrvId = 'srv' + Date.now();
                    MOCK_DATA.services.push({ id: newSrvId, name: '新規メンテナンス', time: '1時間〜', desc: '詳細' });
                    renderMasterPanel(); render();
                    break;
                case 'master-del-store':
                    if(MOCK_DATA.stores.favorites.length > 1) { MOCK_DATA.stores.favorites = MOCK_DATA.stores.favorites.filter(x => x.id !== val); renderMasterPanel(); render(); }
                    break;
                case 'master-del-service':
                    if(MOCK_DATA.services.length > 1) { MOCK_DATA.services = MOCK_DATA.services.filter(x => x.id !== val); renderMasterPanel(); render(); }
                    break;

                // --- シナリオ切り替え ---
                case 'scenario':
                    state.agreedToTerms = true; state.reservations = [];
                    state.draft = { store: null, vehicle: null, service: null, date1: null, date2: null, date3: null, comment: '' };
                    if(val === 'login') { state.agreedToTerms = false; navigate('login'); } 
                    else if (val === 'default') { navigate('top'); } 
                    else if (val === 'one_car') {
                        state.reservations = [{
                            id: 'REQ1', status: 'requesting', store: MOCK_DATA.stores.favorites[0], vehicle: MOCK_DATA.vehicles[0], service: MOCK_DATA.services[0],
                            date1: { date: '2026年9月18日 (木)', time: '10:00〜' }, date2: { date: '2026年9月22日 (月)', time: '15:00〜' }
                        }]; navigate('top');
                    } 
                    else if (val === 'confirmed') {
                        state.reservations = [{
                            id: 'RES999', status: 'confirmed', store: MOCK_DATA.stores.favorites[0], vehicle: MOCK_DATA.vehicles[0], service: MOCK_DATA.services[0],
                            date1: { date: '2026年9月18日 (木)', time: '10:00〜' }
                        }]; navigate('top');
                    }
                    document.getElementById('debugPanel').classList.remove('active');
                    break;
            }
        });

        // テキスト・チェックボックス入力
        document.body.addEventListener('input', (e) => {
            if(e.target.id === 'txt-comment') { state.draft.comment = e.target.value; }
            if(e.target.classList.contains('master-store-name')) {
                const id = e.target.getAttribute('data-id');
                const store = MOCK_DATA.stores.favorites.find(x => x.id === id);
                if(store) { store.name = e.target.value; render(); }
            }
            if(e.target.classList.contains('master-service-name')) {
                const id = e.target.getAttribute('data-id');
                const srv = MOCK_DATA.services.find(x => x.id === id);
                if(srv) { srv.name = e.target.value; render(); }
            }
        });
        document.body.addEventListener('change', (e) => {
            if(e.target.id === 'chk-terms') { state.agreedToTerms = e.target.checked; render(); }
            if(e.target.classList.contains('master-service-time')) {
                const id = e.target.getAttribute('data-id');
                const srv = MOCK_DATA.services.find(x => x.id === id);
                if(srv) { srv.time = e.target.value; render(); }
            }
        });

                    <h2 class="font-bold text-xl mb-8 text-black">リクエスト内容の確認</h2>
                    
                    <div class="bg-white p-6 mb-6 shadow-sm rounded-lg border border-gray-100">
                        <h3 class="font-bold text-base mb-5">実施店舗</h3>
                        <div class="flex items-start gap-4 mb-5">
                            <img src="${d.store.img}" class="w-20 h-14 object-cover rounded border border-gray-100">
                            <div>
                                <span class="bg-toyota-red text-white text-[10px] px-2 py-1 rounded font-bold mb-2 inline-block">ラベル</span>
                                <p class="text-xs text-gray-400 mb-1">${d.store.company}</p>
                                <p class="font-bold text-base leading-tight">${d.store.name}</p>
                            </div>
                        </div>
                        <button class="js-action w-full py-3.5 border border-black rounded text-sm font-bold bg-white text-black hover:bg-gray-50 transition-colors" data-action="navigate" data-val="store">変更する</button>
                    </div>

                    <div class="bg-white p-6 mb-6 shadow-sm rounded-lg border border-gray-100">
                        <h3 class="font-bold text-base mb-5">車両</h3>
                        <p class="font-bold text-2xl leading-none mb-2">${d.vehicle.name}</p>
                        <div class="flex justify-between items-center mb-8">
                            <p class="text-sm font-bold">${d.vehicle.plate}</p>
                            <img src="${d.vehicle.img}" class="w-40 object-contain">
                        </div>
                        <button class="js-action w-full py-3.5 border border-black rounded text-sm font-bold bg-white text-black hover:bg-gray-50 transition-colors" data-action="navigate" data-val="vehicle">変更する</button>
                    </div>

                    <div class="bg-white p-6 mb-6 shadow-sm rounded-lg border border-gray-100">
                        <h3 class="font-bold text-base mb-5">メンテナンス内容</h3>
                        <p class="font-bold text-xl mb-5">${d.service.name}</p>
                        <p class="text-xs text-gray-600 mb-6 leading-relaxed">${d.service.desc}</p>
                        <button class="js-action w-full py-3.5 border border-black rounded text-sm font-bold bg-white text-black hover:bg-gray-50 transition-colors" data-action="navigate" data-val="service">変更する</button>
                    </div>

                    <div class="bg-white p-6 mb-6 shadow-sm rounded-lg border border-gray-100">
                        <h3 class="font-bold text-base mb-5">リクエスト日時</h3>
                        <div class="grid grid-cols-[70px_1fr] gap-4 text-sm mb-8 text-gray-700 items-center">
                            <div class="text-xs font-bold text-black">第1候補</div><div class="font-bold text-base text-black">${d.date1.date} ${d.date1.time}</div>
                            <div class="text-xs font-bold text-black">第2候補</div><div class="font-bold text-base text-black">${d.date2 ? d.date2.date + ' ' + d.date2.time : '未選択'}</div>
                        </div>
                        <button class="js-action w-full py-3.5 border border-black rounded text-sm font-bold bg-white text-black hover:bg-gray-50 transition-colors" data-action="navigate" data-val="date">変更する</button>
                    </div>

                    <div class="bg-transparent mb-10 mt-10">
                        <h3 class="font-bold text-lg mb-3">ご要望・ご相談事項</h3>
                        <textarea id="txt-comment" class="w-full border border-gray-300 rounded-lg p-5 text-sm h-32 bg-white outline-none focus:border-black shadow-inner" placeholder="ご要望やご相談したい事項があればご記入ください。">${d.comment}</textarea>
                    </div>
                </div>

                <div class="sticky-footer flex justify-center bg-gray-200 border-none pt-4 pb-6">
                    <button class="js-action w-full max-w-[400px] py-4 bg-black text-white font-bold rounded shadow-md text-sm hover:bg-gray-800 transition-colors" data-action="submit-request">予約リクエストを送信する</button>
                </div>
            `;
        }

        function renderComplete() { 
            return `
                <div class="p-8 text-center flex-1 bg-white flex flex-col justify-center">
                    <div class="w-20 h-20 rounded-full bg-green-50 text-green-500 flex items-center justify-center text-4xl mx-auto mb-8">✓</div>
                    <h2 class="text-xl font-bold mb-6 tracking-wider">予約リクエストを受け付けました</h2>
                    <button class="js-action w-full py-4 bg-black text-white font-bold rounded shadow-md mt-10 hover:bg-gray-800 transition-colors max-w-[400px] mx-auto text-sm" data-action="navigate" data-val="top">トップへ戻る</button>
                </div>
            `; 
        }

        // --- 初期呼び出し ---
        // initImages() を呼んでからレンダリング
        initImages();

    </script>
</body>
